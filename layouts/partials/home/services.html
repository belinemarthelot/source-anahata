{{ $data := .Site.Data.prestations }}
<section class="py-20 bg-background-default overflow-hidden">
  <div class="container mx-auto px-4 max-w-7xl">
    <!-- En-tête -->
    <div class="mb-20 text-center reveal-view">
      <h2
        class="text-3xl md:text-5xl font-bold text-text-main tracking-tighter mb-4"
      >
        L'Excellence du Soin
      </h2>
      <div class="w-12 h-[2px] bg-primary mx-auto"></div>
    </div>

    <!-- Grille 3 colonnes -->
    <div
      class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-20"
    >
      {{ range $index, $element := $data.prestations }}

      <!-- On utilise l'index LOCAL ($index) pour que l'animation soit rapide -->
      <div
        class="group relative reveal-view"
        style="animation-delay: {{ mul $index 150 }}ms;"
      >
        <!-- IMAGE -->
        <div
          class="relative aspect-[4/4.5] overflow-hidden mb-10 rounded-2xl shadow-sm bg-background-paper/30"
        >
          {{ $img := resources.Get (printf "images/%s" .image) }} {{ if $img }}
          {{ $scaled := $img.Fill "800x900 Center" }}
          <img
            src="{{ $scaled.RelPermalink }}"
            alt="{{ .title }}"
            loading="lazy"
            width="{{ $scaled.Width }}"
            height="{{ $scaled.Height }}"
            class="w-full h-full object-cover transition duration-1000 group-hover:scale-110"
          />
          {{ end }}
          <div
            class="absolute inset-0 bg-background-paper/0 group-hover:bg-background-paper/5 transition-colors duration-700"
          ></div>
        </div>

        <!-- TEXTE -->
        <div class="relative pl-10">
          <!-- Ligne verticale épaisse -->
          <div
            class="absolute left-0 top-0 bottom-0 w-[2px] bg-primary/40 origin-top scale-y-50 group-hover:scale-y-100 transition-transform duration-700"
          ></div>

          <div class="space-y-4">
            <h3
              class="text-2xl font-bold text-text-main uppercase tracking-tight leading-none"
            >
              {{ .title }}
            </h3>

            <p
              class="text-text-main leading-relaxed italic opacity-90"
            >
              {{ .description }}
            </p>

            <!-- BOUTON : Ligne minimaliste -->
            <div class="pt-4">
              <a
                href="{{ .buttonLink }}"
                class="group/link inline-flex items-center gap-4 text-[10px] uppercase tracking-[0.4em] font-bold text-text-main"
              >
                <span
                  class="w-10 h-[1px] bg-primary group-hover/link:w-16 transition-all duration-700"
                ></span>
                {{ .button }}
              </a>
            </div>
          </div>
        </div>
      </div>
      {{ end }}
    </div>
  </div>
</section>
