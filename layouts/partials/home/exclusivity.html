{{ $data := .Site.Data.offre_exclusive }} {{ if $data.offers }}
<section class="py-12 bg-white">
  <div class="container mx-auto px-4">
    <h2
      class="text-3xl font-bold text-center mb-10 decoration-primary underline decoration-2 underline-offset-8"
    >
      {{ $data.title }}
    </h2>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">
      {{ range $data.offers }}
      <div
        class="border border-primary/20 p-6 rounded-lg hover:shadow-md transition-shadow"
      >
        <div class="flex justify-between items-start mb-2">
          <h3 class="text-xl font-bold text-gray-800">{{ .title }}</h3>
          {{ if .price }}
          <span class="text-primary-dark font-bold">{{ .price }} €</span>
          {{ end }}
        </div>
        <p class="text-gray-600 text-sm leading-relaxed">{{ .description }}</p>
      </div>
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
