<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      {{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title
      }}{{ end }}
    </title>

    <!-- Google Fonts: Cardo -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Bridge Hugo -> Tailwind (Injection des variables du theme) -->
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: {
                DEFAULT: "{{ .Site.Params.theme.primary }}",
                light: "{{ .Site.Params.theme.primary_light }}",
                dark: "{{ .Site.Params.theme.primary_dark }}",
              },
              background: {
                default: "{{ .Site.Params.theme.background_default }}",
                paper: "{{ .Site.Params.theme.background_paper }}",
              },
              text: {
                main: "{{ .Site.Params.theme.text_main }}",
                muted: "{{ .Site.Params.theme.text_muted }}",
              },
              btn: {
                bg: "{{ .Site.Params.theme.button_bg }}",
                text: "{{ .Site.Params.theme.button_text }}",
              },
            },
            fontFamily: {
              sans: ["Cardo", "serif"],
              serif: ["Cardo", "serif"],
            },
          },
        },
      };
    </script>

    <style type="text/tailwindcss">
      @layer base {
        body {
          @apply bg-background-default text-text-main font-sans;
        }
      }

      /* On définit nos animations personnalisées */
      @keyframes revealUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      .animate-reveal {
        animation: revealUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      }

      .animate-fade {
        animation: fadeIn 1.5s ease-out forwards;
      }

      /* Délais pour l'effet d'apparition successive (stagger) */
      .delay-200 {
        animation-delay: 0.2s;
      }
      .delay-800 {
        animation-delay: 0.8s;
      }
      .delay-1400 {
        animation-delay: 1.4s;
      }
      .delay-2000 {
        animation-delay: 2s;
      }
    </style>
  </head>
  <body class="flex flex-col min-h-screen">
    <!-- Composant Navigation -->
    {{ partial "navbar.html" . }}

    <!-- Contenu Principal -->
    <main class="flex-grow">{{ block "main" . }}{{ end }}</main>

    <!-- Composant Pied de page -->
    {{ partial "footer.html" . }}
  </body>
</html>
